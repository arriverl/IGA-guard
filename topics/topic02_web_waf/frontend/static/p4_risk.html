<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P4 风险热力 · IGA-Guard</title>
  <link rel="stylesheet" href="/static/assets/common.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="/static/assets/iga-common.js"></script>
</head>
<body>
<div id="app">
  <header class="iga-header">
    <div>
      <h1>IGA-Guard 3.0 · P4 风险热力</h1>
      <small id="iga-subtitle">攻击类型分布 · 延迟风险趋势</small>
    </div>
    <span class="badge">v{{ version }} · {{ health }}</span>
  </header>
  <nav id="iga-nav" class="iga-nav"></nav>

  <div class="grid">
    <div class="card span2">
      <h2>攻击类型分布</h2>
      <div id="pieChart" class="chart-lg"></div>
    </div>

    <div class="card">
      <h2>会话统计</h2>
      <p>告警总数 <span class="stat danger">{{ stats.total_alerts || 0 }}</span></p>
      <p>P99 延迟 <span class="stat">{{ latency.p99_ms || '-' }}</span> ms</p>
      <p>均值 <span class="stat">{{ latency.mean_ms || '-' }}</span> ms</p>
      <p style="font-size:.75rem;color:#64748b">样本数 {{ latency.samples || 0 }}</p>
    </div>

    <div class="card span3">
      <h2>风险热力 · 延迟趋势</h2>
      <div id="lineChart" class="chart-lg"></div>
    </div>

    <div class="card span3">
      <h2>类型明细</h2>
      <div class="row">
        <span v-for="(cnt, label) in stats.attack_distribution || {}" :key="label"
          style="background:#1e293b;padding:.35rem .65rem;border-radius:6px;font-size:.8rem">
          {{ label }}: <strong>{{ cnt }}</strong>
        </span>
        <span v-if="!Object.keys(stats.attack_distribution||{}).length" style="color:#64748b">暂无会话内攻击分布</span>
      </div>
    </div>
  </div>
</div>
<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      version: '3.0.0', health: '...', alerts: [], stats: {}, latency: {},
      latencyHistory: [], charts: {},
    };
  },
  mounted() {
    igaMountShell('p4');
    igaFetchHealth(this);
    this.$nextTick(() => {
      this.charts.pie = echarts.init(document.getElementById('pieChart'));
      this.charts.line = echarts.init(document.getElementById('lineChart'));
      this.refresh();
      setInterval(this.refresh, 8000);
    });
  },
  methods: {
    async refresh() {
      await igaRefreshCore(this);
      const lat = await fetch('/api/metrics/latency').then((r) => r.json());
      if (lat.p99_ms && this.latencyHistory.length < 50) {
        this.latencyHistory.push(lat.p99_ms);
      }
      this.updateCharts();
    },
    updateCharts() {
      if (!this.charts.pie) return;
      const dist = this.stats.attack_distribution || {};
      this.charts.pie.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'item' },
        series: [{ type: 'pie', radius: ['40%', '70%'],
          data: Object.entries(dist).map(([n, v]) => ({ name: n, value: v })),
          label: { color: '#cbd5e1' } }],
      });
      this.charts.line.setOption({
        backgroundColor: 'transparent',
        xAxis: { type: 'category', data: this.latencyHistory.map((_, i) => i + 1), axisLabel: { color: '#94a3b8' } },
        yAxis: { type: 'value', name: 'P99 ms', axisLabel: { color: '#94a3b8' } },
        series: [{ type: 'line', data: this.latencyHistory, smooth: true, areaStyle: { opacity: 0.15 }, lineStyle: { color: '#f59e0b' } }],
      });
    },
  },
}).mount('#app');
</script>
</body>
</html>
