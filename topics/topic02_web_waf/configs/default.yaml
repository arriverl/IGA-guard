# IGA-Guard 3.0
version: "3.0.0"

server:
  host: "127.0.0.1"
  port: 5000

detector:
  engine: "dual_track"          # dual_track | fusion (legacy)
  model_path: "models/fusion_detector.joblib"
  confidence_threshold: 0.38
  cache_force_hit_min: 0.92
  cache_fusion_weight_benign: 0.12
  cache_fusion_weight_obfuscated: 0.42
  fp_guard_max_base_attack: 0.32
  fp_guard_min_attack_conf: 0.55
  fp_guard_tier_b_enabled: true
  obfuscation_boost_min_base_attack: 0.20
  semantic_model: "distilbert-base-uncased"  # optional TinyBERT-v2
  use_semantic_branch: true    # TinyBERT 已用 master 数据集微调
  labels:
    - Normal
    - SQLi
    - XSS
    - CMD
    - PathTraversal
    - FileInclusion
    - XXE
    - PromptInjection

normalizer:
  max_decode_rounds: 8

features:
  candidate_dims: 100
  selected_dims: 15
  rl_gwo_enabled: true

dlinear:
  seq_len: 16
  moving_avg: 4

latency:
  target_ms: 5
  benchmark_iterations: 50000

evolution:
  failure_cache: "data/cache/failures.jsonl"
  retrain_min_samples: 50
  max_base_samples: 80000
  failure_augment: 2
  online_rl_enabled: true
  learning_rate: 0.05
  # 自我迭代：漏检 → 发现新手法 → 扩缓存 → 增量重训
  auto_evolve:
    enabled: true
    registry_path: "data/cache/discovered_techniques.json"
    history_path: "data/cache/auto_evolve_history.jsonl"
    default_rounds: 2
    max_variants_per_round: 200

# Tip-Adapter 风格持续学习缓存（冻结编码器 + 动态 KV 库）
continual_cache:
  enabled: true
  path: "models/continual_cache.npz"
  max_size: 5000
  per_class_seed: 30
  beta: 5.0
  top_k: 8
  fusion_weight: 0.28
  dedupe_threshold: 0.98
  multimodal_alpha: 0.85
  use_vision_keys: true

# IGA-Guard 3.0 多模态轨（协议 + 字节图视觉，冻结编码器）
# 条件融合：混淆样本压低 mm 权重，Normal 流量加强压 FP
multimodal:
  enabled: true
  vision_weight: 0.30
  weight_base: 0.38
  weight_semantic: 0.28
  weight_multimodal: 0.14
  weight_dlinear: 0.12
  # 混淆子集：主信号 RF+语义
  weight_base_obfuscated: 0.42
  weight_semantic_obfuscated: 0.32
  weight_multimodal_obfuscated: 0.04
  weight_dlinear_obfuscated: 0.12
  # 非混淆（含 Normal）：多模态压误报
  weight_base_benign: 0.34
  weight_semantic_benign: 0.24
  weight_multimodal_benign: 0.22
  weight_dlinear_benign: 0.10
  # 门控：base 已确信攻击时不掺 mm
  gate_base_attack_threshold: 0.45
  gate_base_low_threshold: 0.25
  gate_mm_normal_threshold: 0.5
  gate_mm_boost: 1.5
  byte_grid: [32, 64]

llm_agent:
  enabled: false                    # 设为 true 启用 LLM 自主迭代
  provider: "ollama"                # ollama（本地小模型）| openai_compatible（DashScope/OpenAI）
  model: "qwen2.5:0.5b"             # 推荐小模型: qwen2.5:0.5b / qwen2.5:1.5b / phi3:mini / gemma2:2b
  api_base: "http://127.0.0.1:11434"
  api_key_env: "IGA_LLM_API_KEY"    # Ollama 本地通常不需要；云端 API 必填
  timeout_sec: 90
  temperature: 0.85
  max_tokens: 512
  max_variants_per_call: 4
  autonomous: true                  # 漏检反馈驱动下一轮生成

explanation:
  nl_enabled: true
  nl_provider: "template"       # template | local_llm | api

rules:
  export_dir: "data/rules_export"
  virtual_patch_enabled: true

timeseries:
  window: 16

protocols:
  http1: true
  http2: true
  http3: false
  websocket: true
