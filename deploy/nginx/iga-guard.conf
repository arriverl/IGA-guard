# IGA-Guard VPS 即插即用 — nginx 反代到 inline 代理
# 安装: sudo cp deploy/nginx/iga-guard.conf /etc/nginx/sites-available/iga-guard
#       sudo ln -sf /etc/nginx/sites-available/iga-guard /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

upstream iga_guard_proxy {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10m;

    location / {
        proxy_pass http://iga_guard_proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 管理 API 可选单独端口；若需同域 /admin 可取消注释
    # location /admin/ {
    #     proxy_pass http://127.0.0.1:5000/;
    # }
}
